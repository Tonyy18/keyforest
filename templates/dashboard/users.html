{% extends "dashboard/sidebar.html" %}
{% block title %}{{ request.user.organization.name }} | Applications{% endblock %}
{% block body %}
    <div class="modal" id="add-user-modal">
        <div class="modal-padding">
            <div class="modal-body">
                <header><p>Send an invite</p><i class="fas fa-times modal-close"></i></header>
                <section>
                    <form id="send-invite">
                        <div class="modal-notice"></div>
                        <label>
                            <span>Email*</span>
                            <input type="text" class="input input-default" placeholder="Users email">
                        </label>
                        <input type="submit" value="Send" class="btn btn-blue">
                    </form>
                </section>
            </div>
        </div>
        <div class="modal-bg"></div>
    </div>
    <section class="dashboard-page" id="users-page">
        <section class="page-section flex-grow">
            <header>
                <div class="flex">
                    <h1 class="flex-grow">Users</h1>
                    {% if add_users %}
                    <button class="btn btn-green" id="add-user">Add user <i class="fas fa-plus"></i></button>
                    {% endif %}
                </div>
            </header>
            <div class="sidebar-section">
                <div class="section-sidebar">
                    <form id="filter-form">
                        <input type="text" class="input input-default" placeholder="Name" name="username">
                        <div class="checkboxes">
                            <label>
                                <span>By name</span>
                                <input type="checkbox" name="name" checked>
                            </label>
                            <label>
                                <span>By date</span>
                                <input type="checkbox" name="date">
                            </label>
                        </div>
                    </form>
                </div>
                <div class="sidebar-section-content">
                    <div class="user-list" id="user-list">
                    </div>
                    <div class="users-nav">
                        <button disabled class="btn btn-blue"><i class="fas fa-angle-left"></i></button>
                        <button disabled class="btn btn-blue"><i class="fas fa-angle-right"></i></button>
                    </div>
                </div>
            </div>
        </section>
    </section>
    <script>
        const modal = new Modal("add-user-modal")
        $("#send-invite").on("submit", function() {
            const email = $.trim($(this).find("input[type=text]").val())
            const notice = $(this).find(".modal-notice");
            const label = $(this).find("label");
            notice.removeClass("error");
            setTimeout(function() {
                notice.hide();
                label.show();
            }, 3000)
            if(email == "" || !Validators.email(email)) {
                notice.addClass("error").html("Invalid email").show();
                return false;
            };
            $(this).find("input[type=text]").val("");
            Organization.invite(email, (data) => {
                notice.html("Invite send to " + email).show();
            }, (data) => {
                notice.addClass("error");
                let message = "Error ocurred";
                if("error" in data.responseJSON) {
                    message = data.responseJSON["error"]
                }
                notice.html(message).show();
            })
            return false;
        })
        let users = [];
        function create_el(data, org = true) {
            let link = "/dashboard/organization/{{ user.organization.id}}/user/" + data.id;
            if(org = false) {
                link = "/dashboard/user/" + data.id;
            }
            const el = $('<a href=' + link + ' class="user-item"></a>');
            el.append("<img src='" + data.image + "'>");
            el.append("<p>" + data.firstname + " " + data.lastname + "</p>");
            {% if remove_users %}
            el.append('<button class="btn btn-blue remove-user"><i class="fas fa-ban"></i></button>')
            {% endif %}
            return el;
        }
        function set_list_state(state) {
            $("#user-list").html('<div class="user-list-state">' + state + '</div>')
        }
        function list_users(ls) {
            set_list_state('<img src="/static/images/loader.gif" class="loader">')
            if(ls.length == 0) {
                set_list_state("No users found")
                return false;
            }
            $("#user-list").empty();
            for(a in ls) {
                user = ls[a];
                $("#user-list").append(create_el(user));
            }
        }
        $("#add-user").on("click", () => {
            modal.show();
        })
        $("#filter-form input[type='checkbox']").on("change", function() {
            if(!$(this).prop('checked') == false) {
                $("#filter-form input:not([name='" + $(this).attr("name") + "'])").prop("checked", false)
                get_users($(this).attr("name"));
            } else {
                $(this).prop('checked', true)
            }
        })
        function display_by_namefilter(name) {
            name = $.trim(name);
            if(name == "") {
                list_users(users);
                return false;
            };
            const results = users.filter((user) => {
                return user.fullname.toLowerCase().includes(name.toLocaleLowerCase());
            })
            list_users(results);
            return false
        }
        $("#filter-form").on("keyup", function() {
            display_by_namefilter($(this).find("[name='username']").val());
        })
        function get_users(order="") {
            Organization.get_users(order, (data) => {
                users = data.data
                list_users(users);
            }, (data) => {
                //error
                let message = "Error loading users";
                if("error" in data.responseJSON) {
                    message = data.responseJSON["error"]
                }
                set_list_state(message)
            })
        };
        get_users("name");
    </script>
{% endblock %}
