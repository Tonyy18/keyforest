{% extends "include/base.html" %}
{% load static %}
{% block b_head %}
<link rel="stylesheet" type="text/css" href="{% static '/css/marketplace.css'%}">
{% endblock %}
{% block b_body %}
<nav class="navbar">
    <div class="container">
        <header>
            <h1 class="logo">KeyForest</h1>
        </header>
        <div class="collapse">
            <ul class="menu">
                <li class="form-item">
                    <form>
                        <label>
                            <i class="fas fa-search"></i>
                            <input type="text" placeholder="Search">
                        </label>
                    </form>
                </li>
                {% if user.is_authenticated %}
                <li><a href="#">Purchases</a></li>
                <li><a href="/logout">Logout</a></li>
                {% endif %}
                {% if user.is_authenticated == False %}
                <li><a href="/signin?next=/market">Login</a></li>
                <li><a href="/register?next=/market">Register</a></li>
                {% endif %}
            </ul>
        </div>
    </div>
</nav>
{% endblock %}
