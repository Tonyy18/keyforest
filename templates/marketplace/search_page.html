<div class="container search-results">
    <header>
        <h1>Search results (<span>{{apps|length}}</span>)</h1>
    </header>
    <div class="search-results-objects" id="search-results-objects">
        {% for app in apps %}
        <a href="/market/seller/1/app/{{app.id}}" class="app-thumb">
            <div class="app-image" style="background-image: url({{app.image}})">
                <span class="app-price">Free</span>
            </div>
            <div class="app-info">
                <h3 class="app-name">{% get_thumbnail_name app.name %}</h3>
                <p class="app-creator">{{app.organization.name}}</p>
            </div>
        </a>
        {% empty %}
        <h2 class="tac no-results">No results found</h2>
        {% endfor %}
    </div>
