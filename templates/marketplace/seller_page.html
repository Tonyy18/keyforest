{% extends "marketplace/seller_page_header.html" %}
{% load application_tags %}
{% block s_body%}
{% for app in apps %}
<a href="/market/seller/{{app.organization.id}}/app/{{app.id}}" class="app-thumb">
    <div class="app-image" style="background-image: url({{app.image}})">
    </div>
    <div class="app-info">
        <div class="app-info-left">
            <img src="{{app.organization.image}}">
        </div>
        <div class="app-info-right">
            <p class="app-name">{{app.name}}</p>
            <p class="app-footer">{{app.organization.name}}</p>
        </div>
    </div>
</a>
{% endfor %}
{% endblock %}
